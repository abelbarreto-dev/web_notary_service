services:
  database_prod:
    image: postgres:18-alpine
    container_name: web_notary_db_prod_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGTZ: ${TIMEZONE}
    ports:
      - "5434:5432"
    volumes:
      - pg_data_prod:/var/lib/postgresql/18/docker

  database_test:
    image: postgres:18-alpine
    container_name: web_notary_db_test_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER_TEST}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_TEST}
      POSTGRES_DB: ${POSTGRES_DB_TEST}
      PGTZ: ${TIMEZONE}
    ports:
      - "5435:5432"
    volumes:
      - pg_data_test:/var/lib/postgresql/18/docker

volumes:
  pg_data_prod:
  pg_data_test:
