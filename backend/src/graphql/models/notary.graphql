enum NotaryStatus {
    PENDING,
    IN_PROGRESS,
    COMPLETED
}

enum NotaryType {
    BIRTH_CERTIFICATE,
    SIGNATURE_AUTHENTICATION,
    DOCUMENT_AUTHENTICATION,
    DEED,
    OTHER
}

input NotaryInput {
    id: ID
    applicant: String!
    cpf: String!
    description: String!
    requestDate: DateTime!
    userId: String!
    remarks: String
    notaryStatus: NotaryStatus!
    notaryType: NotaryType!
}

input NotaryId {
    id: String!
}

type Notary {
    id: ID!
    applicant: String!
    cpf: String!
    description: String!
    requestDate: DateTime!
    remarks: String
    userId: String!
    notaryStatus: NotaryStatus!
    notaryType: NotaryType!
    createdAt: DateTime!
    updatedAt: DateTime
}

extend type Query {
    findAllNotaries(user: UserId): NotaryListResponse
}

extend type Mutation {
    createNotary(notary: NotaryInput): NotaryResponse,
    updateNotary(notary: NotaryInput): NotaryResponse,
    deleteNotary(notary: NotaryId): NotaryResponse,
}
