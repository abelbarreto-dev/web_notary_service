enum UserRole {
    ADMINISTRATOR,
    ATTENDANT
}

input UserInput {
    name: String!
    email: String!
    password: String!
    profile: UserRole!
}

input UserLogin {
    email: String!
    password: String!
}

input UserId {
    id: String!
}

type User {
    id: ID!
    name: String!
    email: String!
    profile: UserRole!
    createdAt: DateTime!
    updatedAt: DateTime
}

extend type Query {
    findAllUsers: UserListResponse
}

extend type Mutation {
    createUser(user: UserInput): UserResponse,
    updateUser(user: UserInput): UserResponse,
    deleteUser(user: UserId): UserResponse,
    singInUser(user: UserLogin): UserResponse,
}
